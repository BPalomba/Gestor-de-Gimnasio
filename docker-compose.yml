services:

  postgres:
    image: postgres:16-alpine
    container_name: gymsaas-db
    environment:
      POSTGRES_DB: gymsaas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gymsaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gymsaas-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gymsaas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_OPEN_IN_VIEW: false
      APP_JWT_SECRET: ${JWT_SECRET:-miSecretSuperLargoParaProduccion2026GymSaaS}
      APP_JWT_EXPIRATION_MS: 900000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000
      LOGGING_LEVEL_COM_GYMSAAS: INFO
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres-data: